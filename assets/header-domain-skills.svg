<svg width="400" height="80" viewBox="0 0 400 80" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMinYMid meet">
  <defs>
    <linearGradient id="headerBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#faf8f3"/>
      <stop offset="100%" style="stop-color:#f3eee4"/>
    </linearGradient>
  </defs>

  <!-- Main container -->
  <rect x="0.5" y="0.5" width="399" height="79" rx="4" ry="4" fill="url(#headerBg)" stroke="#c4baa8" stroke-width="1"/>

  <!-- Inner decorative border -->
  <rect x="8" y="8" width="384" height="64" rx="2" ry="2" fill="none" stroke="#d2c5b4" stroke-width="0.5" stroke-dasharray="4 2"/>

  <!-- Corner flourishes -->
  <g fill="none" stroke="#c4baa8" stroke-width="1" opacity="0.6">
    <path d="M 20,20 L 20,30 M 20,20 L 30,20"/>
    <path d="M 380,20 L 380,30 M 380,20 L 370,20"/>
    <path d="M 20,60 L 20,50 M 20,60 L 30,60"/>
    <path d="M 380,60 L 380,50 M 380,60 L 370,60"/>
  </g>

  <!-- Title -->
  <text x="200.0" y="50"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="28"
        font-weight="600"
        fill="#3d3530"
        text-anchor="middle"
        letter-spacing="3">
    DOMAIN SKILLS
  </text>
</svg>