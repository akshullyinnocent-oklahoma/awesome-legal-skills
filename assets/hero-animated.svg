<svg width="900" height="220" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,600;0,700;0,800;1,600;1,700&amp;display=swap');
    </style>

    <!-- Dotted grid pattern -->
    <pattern id="dotGrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.8" fill="#c4baa8" opacity="0.4"/>
    </pattern>

    <clipPath id="lineReveal">
      <rect x="0" y="0" width="900" height="0">
        <animate attributeName="height" values="0;220;220;0;0" keyTimes="0;0.286;0.857;0.943;1" dur="7s" repeatCount="indefinite" calcMode="linear"/>
      </rect>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" fill="#faf5f0"/>
  <rect width="900" height="220" fill="url(#dotGrid)"/>

  <!-- Content revealed via clip path -->
  <g clip-path="url(#lineReveal)">

    <!-- ═══ NAV BAR ═══ -->
    <!-- 3D cartoon shadow (6px offset) -->
    <rect x="24" y="16" width="864" height="42" rx="21" fill="#141413"/>
    <!-- Main nav pill -->
    <rect x="18" y="10" width="864" height="42" rx="21" fill="white" stroke="#141413" stroke-width="2"/>

    <!-- Logo + Brand name -->
    <a href="https://www.lawvable.com/en" target="_blank">
      <rect x="29" y="17" width="26" height="26" rx="6" fill="#c96442" stroke="#1a1a1a" stroke-width="1.2" style="cursor:pointer"/>
      <text x="42" y="36" font-family="Poppins, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle" style="cursor:pointer">L</text>
      <text x="64" y="38" font-family="Poppins, sans-serif" font-size="16" font-weight="800" fill="#1a1a1a" letter-spacing="0.5" style="cursor:pointer">LAWVABLE</text>
    </a>

    <!-- Tab container pill -->
    <rect x="578" y="17" width="170" height="28" rx="13" fill="#F8F7F3" fill-opacity="0.5" stroke="#F8F7F3" stroke-width="1.5"/>

    <!-- SKILLS tab (inactive) -->
    <a href="https://www.lawvable.com/en/skills" target="_blank">
      <text x="607" y="35" font-family="Poppins, sans-serif" font-size="9" font-weight="800" fill="#8A8880" text-anchor="middle" letter-spacing="1.5" style="cursor:pointer">SKILLS</text>
    </a>

    <!-- GUIDES tab (inactive) -->
    <a href="https://www.lawvable.com/en/learn/what-is-a-skill" target="_blank">
      <text x="662" y="35" font-family="Poppins, sans-serif" font-size="9" font-weight="800" fill="#8A8880" text-anchor="middle" letter-spacing="1.5" style="cursor:pointer">GUIDES</text>
    </a>

    <!-- BLOG tab (inactive) -->
    <a href="https://www.lawvable.com/en/blog" target="_blank">
      <text x="724" y="35" font-family="Poppins, sans-serif" font-size="9" font-weight="800" fill="#8A8880" text-anchor="middle" letter-spacing="1.5" style="cursor:pointer">BLOG</text>
    </a>

    <!-- Separator -->
    <line x1="766" y1="18" x2="766" y2="44" stroke="#d0d0d0" stroke-width="1"/>

    <!-- GET STARTED button -->
    <a href="https://www.lawvable.com/en/learn/demos" target="_blank">
      <rect x="778" y="17" width="92" height="28" rx="14" fill="#1a1a1a" style="cursor:pointer"/>
      <text x="824" y="35" font-family="Poppins, sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="0.8" style="cursor:pointer">GET STARTED</text>
    </a>

    <!-- ═══ HERO TEXT ═══ -->
    <text x="42" y="125" font-family="Poppins, sans-serif" font-size="56" font-weight="700" fill="#1a1a1a">The Ultimate</text>

    <text x="42" y="195" font-family="Poppins, sans-serif" font-size="56" font-weight="700">
      <tspan fill="#c96442">Agent Skills </tspan><tspan fill="#1a1a1a">Hub for Law</tspan>
    </text>

  </g>

  <!-- Print head scan line -->
  <line x1="0" y1="0" x2="900" y2="0" stroke="#c96442" stroke-width="2" opacity="0.7">
    <animate attributeName="y1" values="0;220;220;0;0" keyTimes="0;0.286;0.857;0.943;1" dur="7s" repeatCount="indefinite" calcMode="linear"/>
    <animate attributeName="y2" values="0;220;220;0;0" keyTimes="0;0.286;0.857;0.943;1" dur="7s" repeatCount="indefinite" calcMode="linear"/>
    <animate attributeName="opacity" values="0.8;0.8;0.2;0.8;0.8" keyTimes="0;0.286;0.5;0.857;1" dur="7s" repeatCount="indefinite"/>
  </line>

  <!-- Print head glow -->
  <rect x="0" y="-3" width="900" height="6" fill="#c96442" opacity="0.15">
    <animate attributeName="y" values="-3;217;217;-3;-3" keyTimes="0;0.286;0.857;0.943;1" dur="7s" repeatCount="indefinite" calcMode="linear"/>
    <animate attributeName="opacity" values="0.2;0.2;0;0.2;0.2" keyTimes="0;0.286;0.5;0.857;1" dur="7s" repeatCount="indefinite"/>
  </rect>

  <!-- Horizontal streak sweep -->
  <g opacity="0.2">
    <rect x="-60" y="20" width="3" height="180" fill="#5c5247" rx="1">
      <animate attributeName="x" values="-60;-60;960;960;-60" keyTimes="0;0.286;0.4;0.943;1" dur="7s" repeatCount="indefinite" calcMode="linear"/>
    </rect>
    <rect x="-50" y="40" width="2" height="140" fill="#6b5b4f" rx="1">
      <animate attributeName="x" values="-50;-50;970;970;-50" keyTimes="0;0.286;0.4;0.943;1" dur="7s" repeatCount="indefinite" calcMode="linear"/>
    </rect>
    <rect x="-42" y="55" width="1.5" height="110" fill="#c96442" rx="0.5">
      <animate attributeName="x" values="-42;-42;978;978;-42" keyTimes="0;0.286;0.4;0.943;1" dur="7s" repeatCount="indefinite" calcMode="linear"/>
    </rect>
    <rect x="-36" y="45" width="1" height="130" fill="#8a7b6f" rx="0.5">
      <animate attributeName="x" values="-36;-36;984;984;-36" keyTimes="0;0.286;0.4;0.943;1" dur="7s" repeatCount="indefinite" calcMode="linear"/>
    </rect>
  </g>
</svg>
